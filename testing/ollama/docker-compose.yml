services:
  ollama:
    image: "ollama/ollama"
    container_name: "ollama"
    restart: "unless-stopped"
    # Hardware limits to 8 cores and 8gb of ram
    # cpus: "8"
    # mem_limit: "8g"

    # Expose API port from the ollama server
    ports:
      - "11434:11434"

    # Host dependencies (Arch Linux):
    # intel-compute-runtime level-zero-headers level-zero-loader ocl-icd clinfo vulkan-intel
    # Verify using: clinfo | grep "Intel"
    # getent group video | cut -d: -f3
    # getent group render | cut -d: -f3
    group_add:
      - "985"
      - "989"
    devices:
      - /dev/dri:/dev/dri

    volumes:
      - ./data:/root/.ollama
